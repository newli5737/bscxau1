server {
    listen 80;
    server_name api7.vanquyenhair.name.vn;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api7.vanquyenhair.name.vn;

    # SSL (Let's Encrypt - chạy certbot trước)
    ssl_certificate /etc/letsencrypt/live/api7.vanquyenhair.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api7.vanquyenhair.name.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API requests
    location /api/ {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Body size (cho upload nếu cần)
        client_max_body_size 10M;
    }

    # WebSocket (admin notifications)
    location /ws/ {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket timeout
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Socket.IO polling fallback
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
