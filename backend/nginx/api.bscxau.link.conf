# ===========================================================
# Nginx config cho api.bscxau.link - Bước 1: HTTP only
# Dùng file này TRƯỚC khi chạy certbot để cấp SSL
# Copy file này vào: /etc/nginx/sites-available/api.bscxau.link
# Symlink:  ln -s /etc/nginx/sites-available/api.bscxau.link /etc/nginx/sites-enabled/
# ===========================================================

server {
    listen 80;
    server_name api.bscxau.link;

    # Cho phép certbot xác thực qua HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API requests
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Body size (cho upload nếu cần)
        client_max_body_size 10M;
    }

    # WebSocket (admin notifications)
    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Socket.IO polling fallback
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
